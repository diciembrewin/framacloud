<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FarmaCloud — Iniciar sesión</title>

    <style>

        /* =========================
           RESET
        ========================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        /* =========================
           BODY
        ========================= */

        body {
            min-height: 100vh;
            background: #f8f8ff;
            font-family: Arial, Helvetica, sans-serif;
            color: #222;
        }


        /* =========================
           CONTENEDOR PRINCIPAL
        ========================= */

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }


        /* =========================
           ÁREA DE LOGIN
        ========================= */

        .login-area {
            flex: 1;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 40px 20px;
        }


        /* =========================
           TARJETA DE LOGIN
        ========================= */

        .login-card {

            width: 100%;

            max-width: 460px;

            min-height: 380px;

            background: #ffffff;

            border: 1px solid #eeeeee;

            border-radius: 12px;

            padding: 38px 66px 42px;

            box-shadow:
                0 2px 6px rgba(0, 0, 0, 0.04);

        }


        /* =========================
           LOGO
        ========================= */

        .logo {

            text-align: center;

            margin-bottom: 45px;

        }


        .logo-text {

            font-size: 45px;

            font-weight: 300;

            letter-spacing: -2px;

            color: #1768ff;

        }


        .logo-text strong {

            font-weight: 800;

            font-style: italic;

        }


        /* =========================
           TÍTULO
        ========================= */

        .login-title {

            text-align: center;

            font-size: 21px;

            font-weight: 400;

            color: #222;

            margin-bottom: 18px;

        }


        /* =========================
           FORMULARIO
        ========================= */

        .form-group {

            position: relative;

            margin-bottom: 17px;

        }


        .form-control {

            width: 100%;

            height: 37px;

            padding: 0 13px;

            border: 1px solid #e4e7ed;

            border-radius: 8px;

            outline: none;

            font-size: 14px;

            color: #333;

            background: #ffffff;

            transition: 0.2s ease;

        }


        .form-control::placeholder {

            color: #b5bdc9;

        }


        .form-control:focus {

            border-color: #1768ff;

            box-shadow:

                0 0 0 2px rgba(23, 104, 255, 0.08);

        }


        /* =========================
           CONTRASEÑA
        ========================== */

        .password-wrapper {

            position: relative;

        }


        .password-wrapper .form-control {

            padding-right: 45px;

        }


        .eye-button {

            position: absolute;

            right: 10px;

            top: 50%;

            transform: translateY(-50%);

            border: none;

            background: transparent;

            cursor: pointer;

            color: #a8a8a8;

            font-size: 19px;

        }


        .eye-button:hover {

            color: #777;

        }


        /* =========================
           BOTÓN
        ========================== */

        .login-button {

            width: 100%;

            height: 40px;

            border: none;

            border-radius: 8px;

            background: #1768ff;

            color: #ffffff;

            font-size: 17px;

            font-weight: 400;

            cursor: pointer;

            transition: 0.2s ease;

            margin-top: 1px;

        }


        .login-button:hover {

            background: #0759e8;

        }


        .login-button:active {

            transform: scale(0.99);

        }


        /* =========================
           RECUPERAR CONTRASEÑA
        ========================== */

        .forgot-password {

            display: block;

            text-align: center;

            margin-top: 13px;

            color: #2862ca;

            font-size: 14px;

            text-decoration: none;

        }


        .forgot-password:hover {

            text-decoration: underline;

        }


        /* =========================
           FOOTER
        ========================== */

        .footer {

            width: 100%;

            padding: 0 17px 12px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 20px;

            color: #969ba4;

            font-size: 13px;

        }


        .footer a {

            color: #969ba4;

            text-decoration: none;

        }


        .footer a:hover {

            text-decoration: underline;

        }


        .footer-right {

            text-align: right;

        }


        /* =========================
           RESPONSIVE
        ========================== */

        @media (max-width: 600px) {


            .login-card {

                max-width: 420px;

                padding: 35px 30px 38px;

            }


            .logo-text {

                font-size: 39px;

            }


            .footer {

                flex-direction: column;

                text-align: center;

                padding-bottom: 18px;

            }


            .footer-right {

                text-align: center;

            }

        }

    </style>

</head>


<body>


    <div class="page">


        <!-- =========================
             ÁREA DE LOGIN
        ========================= -->

        <main class="login-area">


            <div class="login-card">


                <!-- LOGO -->

                <div class="logo">

                    <div class="logo-text">

                        <strong>Farma</strong>cloud

                    </div>

                </div>


                <!-- TÍTULO -->

                <h1 class="login-title">

                    Ingresa a tu cuenta

                </h1>


                <!-- FORMULARIO -->

                <form id="loginForm">


                    <!-- USUARIO -->

                    <div class="form-group">

                        <input

                            type="text"

                            id="username"

                            class="form-control"

                            placeholder="Usuario"

                            required

                        >

                    </div>


                    <!-- CONTRASEÑA -->

                    <div class="form-group password-wrapper">

                        <input

                            type="password"

                            id="password"

                            class="form-control"

                            placeholder="Contraseña"

                            required

                        >


                        <button

                            type="button"

                            class="eye-button"

                            id="togglePassword"

                            aria-label="Mostrar contraseña"

                        >

                            ◉

                        </button>

                    </div>


                    <!-- BOTÓN -->

                    <button

                        type="submit"

                        class="login-button"

                    >

                        Iniciar sesión

                    </button>


                    <!-- RECUPERAR CONTRASEÑA -->

                    <a

                        href="#"

                        class="forgot-password"

                    >

                        Olvidé mi contraseña

                    </a>


                </form>


            </div>


        </main>


        <!-- =========================
             FOOTER
        ========================= -->

        <footer class="footer">


            <div>

                <a href="#">

                    Términos y Condiciones

                </a>

            </div>


            <div class="footer-right">

                Un producto de Bitsion -

                2026.2.0.0 S11

                -

                b3e8b0d70d825cdfa66c40ed3bc731d1

            </div>


        </footer>


    </div>


    <!-- =========================
         JAVASCRIPT
    ========================= -->

    <script>


        const togglePassword =

            document.getElementById(

                "togglePassword"

            );


        const password =

            document.getElementById(

                "password"

            );


        togglePassword.addEventListener(

            "click",

            function () {


                if (

                    password.type === "password"

                ) {

                    password.type = "text";

                    togglePassword.textContent = "◉";

                }

                else {

                    password.type = "password";

                    togglePassword.textContent = "◉";

                }

            }

        );


        document

            .getElementById("loginForm")

            .addEventListener(

                "submit",

                function (event) {


                    event.preventDefault();


                    const username =

                        document

                            .getElementById(

                                "username"

                            )

                            .value;


                    const passwordValue =

                        document

                            .getElementById(

                                "password"

                            )

                            .value;


                    if (

                        username === "" ||

                        passwordValue === ""

                    ) {

                        alert(

                            "Los dos campos son obligatorios"

                        );

                        return;

                    }


                    alert(

                        "Formulario enviado correctamente"

                    );

                }

            );

    </script>


</body>

</html>
