<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacloud</title>
    <meta name="robots" content="index, follow">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
            color: #1a2633;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        .logo {
            font-size: 2.8rem;
            font-weight: 900;
            color: #0a2e4a;
        }
        .logo span {
            color: #1f7a8c;
        }
        .spinner {
            border: 4px solid #e1e8ec;
            border-top: 4px solid #0a2e4a;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .subtitle {
            color: #5d6b75;
            font-size: 1.1rem;
        }
        .small {
            color: #8a9aa8;
            font-size: 0.85rem;
            margin-top: 30px;
        }
        .small a {
            color: #1f7a8c;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Farma<span>cloud</span></div>
        <div class="spinner"></div>
        <p class="subtitle">Cargando tu versión local...</p>
        <p class="small">
            ⏳ Si no eres redirigido automáticamente, 
            <a href="inicio.html">haz clic aquí</a>
        </p>
    </div>

</body>
</html>
