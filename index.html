<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacloud - Cargando...</title>
    <!-- ✅ Esto es TRANSPARENTE para Googlebot -->
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://tudominio.com/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2e4a 0%, #1a4a6a 100%);
            color: white;
            margin: 0;
            padding: 20px;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 15px;
        }
        .logo span {
            color: #d9f0f2;
        }
        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .small {
            opacity: 0.6;
            font-size: 0.85rem;
            margin-top: 25px;
        }
        .small a {
            color: #d9f0f2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="logo">Farma<span>cloud</span></div>
        <p class="subtitle">Cargando tu versión local...</p>
        <p class="subtitle" style="font-size:0.9rem; opacity:0.7;">Loading your local version...</p>
        <p class="small">
            ⏳ Si no eres redirigido automáticamente, 
            <a href="inicio.html">haz clic aquí</a>
        </p>
    </div>

    <!-- ✅ REDIRECCIÓN CON META - TRANSPARENTE PARA GOOGLEBOT -->
    <meta http-equiv="refresh" content="2; URL=inicio.html">

    <!-- ✅ REDIRECCIÓN CON JAVASCRIPT - MEJORA UX -->
    <script>
        (function(){
            // Si ya tiene parámetro country, respetarlo
            const urlParams = new URLSearchParams(window.location.search);
            const countryParam = urlParams.get('country');
            
            if (countryParam === 'AR') {
                window.location.href = 'f.html';
                return;
            }
            
            // Detectar país automáticamente
            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(d => {
                    if (d.country === 'AR') {
                        window.location.href = 'f.html';
                    } else {
                        window.location.href = 'inicio.html';
                    }
                })
                .catch(() => {
                    window.location.href = 'inicio.html';
                });
        })();
    </script>
</body>
</html>
